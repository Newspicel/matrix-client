<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="latticeBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b6cff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="latticeStroke" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#latticeBg)"/>

  <g stroke="url(#latticeStroke)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Diamond lattice: three rows of diamonds linked by edges -->
    <!-- Row 1 (top) -->
    <path d="M256 96 L160 192 L256 288 L352 192 Z"/>
    <!-- Row 2 (bottom) -->
    <path d="M256 224 L160 320 L256 416 L352 320 Z"/>
    <!-- Cross lattice diagonals connecting nodes -->
    <path d="M160 192 L160 320"/>
    <path d="M352 192 L352 320"/>
    <path d="M256 96 L256 416"/>
  </g>

  <!-- Nodes -->
  <g fill="#ffffff">
    <circle cx="256" cy="96" r="18"/>
    <circle cx="160" cy="192" r="18"/>
    <circle cx="352" cy="192" r="18"/>
    <circle cx="256" cy="256" r="20"/>
    <circle cx="160" cy="320" r="18"/>
    <circle cx="352" cy="320" r="18"/>
    <circle cx="256" cy="416" r="18"/>
  </g>
</svg>
