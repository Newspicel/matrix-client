name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: ubuntu-24.04
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version from tag
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$RELEASE_TAG' is not a valid semver release tag" >&2
            exit 1
          fi
          echo "Setting package.json version to $version"
          RELEASE_VERSION="$version" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Typecheck
        run: pnpm typecheck

      - name: Build renderer/main
        run: pnpm build

      - name: Import Apple signing certificate
        if: matrix.platform == 'mac'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/cert.p12

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: build.keychain
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
        run: pnpm exec electron-builder --mac --arm64 --x64 --publish always

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --linux --publish always

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lattice-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  update-flake:
    name: Bump flake pin
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version
        id: ver
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping non-stable tag $TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Download Linux AppImage artifact
        if: steps.ver.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: lattice-linux
          path: artifacts

      - name: Compute SRI hash
        if: steps.ver.outputs.skip != 'true'
        id: hash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          appimage="artifacts/Lattice-${VERSION}.AppImage"
          if [[ ! -f "$appimage" ]]; then
            echo "::error::AppImage not found at $appimage" >&2
            ls -la artifacts || true
            exit 1
          fi
          hex=$(sha256sum "$appimage" | awk '{print $1}')
          b64=$(printf '%s' "$hex" | xxd -r -p | base64)
          echo "hash=sha256-${b64}" >> "$GITHUB_OUTPUT"

      - name: Patch flake.nix
        if: steps.ver.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          HASH: ${{ steps.hash.outputs.hash }}
        run: |
          set -euo pipefail
          sed -i -E "s|^([[:space:]]*version[[:space:]]*=[[:space:]]*\")[^\"]+(\";)|\1${VERSION}\2|" flake.nix
          sed -i -E "s|^([[:space:]]*hash[[:space:]]*=[[:space:]]*\")sha256-[^\"]+(\";)|\1${HASH}\2|" flake.nix
          echo "--- flake.nix (updated) ---"
          grep -E '^\s*(version|hash)\s*=' flake.nix

      - name: Install Nix
        if: steps.ver.outputs.skip != 'true'
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Refresh flake.lock
        if: steps.ver.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Creates flake.lock on first run; otherwise fills in any missing
          # inputs without mutating existing pins. Use `nix flake update` if
          # you want to deliberately bump nixpkgs.
          nix flake lock

      - name: Verify flake builds
        if: steps.ver.outputs.skip != 'true'
        run: nix build .#lattice --no-link --print-build-logs

      - name: Commit and push
        if: steps.ver.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- flake.nix flake.lock; then
            echo "flake.nix and flake.lock already up to date for v${VERSION}; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "chore(flake): bump to v${VERSION}"
          git push origin HEAD:main
