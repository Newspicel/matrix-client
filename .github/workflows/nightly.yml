name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if there were no commits in the last 24h'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check:
    name: Check for changes
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.guard.outputs.should_build }}
      version: ${{ steps.guard.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to build
        id: guard
        run: |
          set -euo pipefail
          force="${{ github.event.inputs.force }}"
          since="$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)"
          count="$(git log --since="$since" --pretty=oneline | wc -l | tr -d ' ')"
          echo "Commits in last 24h: $count"
          if [ "$count" -gt 0 ] || [ "$force" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No commits in the last 24h — skipping nightly build."
          fi
          base="$(node -p "require('./package.json').version")"
          stamp="$(date -u +%Y%m%d)"
          short="$(git rev-parse --short HEAD)"
          echo "version=${base}-nightly.${stamp}.${short}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: ubuntu-24.04
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set nightly version
        env:
          NIGHTLY_VERSION: ${{ needs.check.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.NIGHTLY_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Typecheck
        run: pnpm typecheck

      - name: Build renderer/main
        run: pnpm build

      - name: Import Apple signing certificate
        if: matrix.platform == 'mac'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/cert.p12

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: build.keychain
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
        run: pnpm exec electron-builder --mac --arm64 --x64 --publish never

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: pnpm exec electron-builder --linux --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lattice-nightly-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.blockmap
            dist/nightly*.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish nightly release
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: lattice-nightly-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts || true

      - name: Delete previous nightly release (rolling)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Publish rolling nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly ${{ needs.check.outputs.version }}
          body: |
            Automated nightly build from `${{ github.sha }}`.
            Version: `${{ needs.check.outputs.version }}`.

            These builds are unstable and intended for testing only.
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: artifacts/*
          fail_on_unmatched_files: true
